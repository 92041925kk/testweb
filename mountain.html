<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <title>Offline Mode | 劉擎的登山紀實</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="brand">
                <span class="logo">劉擎 | Offline Mode</span>
            </div>
            <a href="index.html" class="btn-outline">← 返回主頁</a>
        </div>
    </header>

    <main style="padding-top: 100px;">
        <main style="padding-top: 100px;">
        <section class="container">
            <div class="hero-banner">
                <img src="https://i.postimg.cc/KzyLdv46/20240421-053558.jpg" alt="登山大首圖">
                <div class="banner-overlay">
                    <span class="location-tag">📍 奇萊南峰 | 海拔 3358m 黃金草原</span>
                </div>
            </div>
        </section>

        <section class="text-center">
            <div class="container section-inner">
                <h1 class="glitch-text" style="color: #fff; font-size: 3rem; margin-bottom: 20px;">海拔 3000m+ 的視角</h1>
                <p>當我不在電腦前寫程式或做研究時，我通常在山林裡。<br>身為登山社的一員，這項運動教會了我如何在極限環境下保持冷靜，以及團隊合作的重要性。</p>
            </div>
        </section>

        <section class="gallery-section">
            <div class="container">
                <div class="photo-gallery">
                    <div class="photo-card">
                        <img src="https://i.postimg.cc/85rpB1tZ/20240625-0919452.jpg" alt="百岳登頂照">
                        <div class="photo-caption">
                            <h3>百岳登頂紀錄</h3>
                            <p>克服高山症的極限挑戰</p>
                        </div>
                    </div>

                    <div class="photo-card">
                        <img src="https://i.postimg.cc/V64Rg8vX/IMG-8680.jpg" alt="團隊合作">
                        <div class="photo-caption">
                            <h3>團隊嚮導</h3>
                            <p>帶領社員安全下山是最大的責任</p>
                        </div>
                    </div>

                    <div class="photo-card">
                        <img src="https://i.postimg.cc/DZFF9thJ/20240915-130341.jpg" alt="泳渡日月潭">
                        <div class="photo-caption">
                            <h3>其他運動</h3>
                            <p>除了爬山，泳渡日月潭也是可以的</p>
                        </div>
                    </div>
                    
                    </div>
            </div>
